services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka_news_rag
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  mongodb:
      image: mongo:latest
      container_name: mongo_news_rag
      ports:
        - "27017:27017"
      deploy:
        resources:
          limits:
            memory: 2G # Giới hạn 2GB RAM cho Mongo
      environment:
        - MONGO_INITDB_ROOT_USERNAME=newsrag
        - MONGO_INITDB_ROOT_PASSWORD=newsrag
      volumes:
        - ./data/mongo_data:/data/db
  postgres:
    image: ankane/pgvector:latest # Bản có sẵn vector search
    container_name: postgres_news_rag
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=newsrag
      - POSTGRES_PASSWORD=newsrag
      - POSTGRES_DB=news_rag
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_news_rag
    ports:
      - "6333:6333" # Cổng API REST
      - "6334:6334" # Cổng gRPC (nhanh hơn cho Python)
    volumes:
      - ./data/qdrant_data:/qdrant/storage
volumes:
  mongo_data:
  postgres_data: